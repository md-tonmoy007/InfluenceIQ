<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-labelledby="title desc">
  <title id="title">InfluenceIQ Scoreline Mark</title>
  <desc id="desc">A rising connected scoreline with four evidence nodes inside a black rounded square.</desc>
  <rect width="72" height="72" rx="18" fill="#0a0b10"/>
  <path d="M15 48L29 31L42 39L56 22" fill="none" stroke="url(#scorelineGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="15" cy="48" r="5.5" fill="#9be3f1"/>
  <circle cx="29" cy="31" r="5.5" fill="#ffffff"/>
  <circle cx="42" cy="39" r="5.5" fill="#ff8a6b"/>
  <circle cx="56" cy="22" r="5.5" fill="#8557ff"/>
  <defs>
    <linearGradient id="scorelineGradient" x1="15" y1="48" x2="56" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7dd7ec"/>
      <stop offset="0.52" stop-color="#ff8a6b"/>
      <stop offset="1" stop-color="#8557ff"/>
    </linearGradient>
  </defs>
</svg>
