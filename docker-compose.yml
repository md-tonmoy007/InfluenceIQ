services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influenceiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influenceiq}
      POSTGRES_DB: ${POSTGRES_DB:-influenceiq}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influenceiq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend-core:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: uvicorn backend_core.app:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8002:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_ai_agent:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A ai_agent_services.worker:celery_app worker -Q ai_agent_queue -c 2 -n ai_agent@%h
    env_file: .env
    environment:
      PYTHONPATH: /workspace/backend:/workspace/platform:/workspace
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  worker_scraping:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A scraping_service.worker:celery_app worker -Q scraping_queue -c 8 -n scraping@%h
    env_file: .env
    environment:
      PYTHONPATH: /workspace/backend:/workspace/platform:/workspace
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  worker_scoring:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A scoring_service.worker:celery_app worker -Q scoring_queue -c 4 -n scoring@%h
    env_file: .env
    environment:
      PYTHONPATH: /workspace/backend:/workspace/platform:/workspace
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A ai_agent_services.worker:celery_app flower --port=5555
    env_file: .env
    environment:
      PYTHONPATH: /workspace/backend:/workspace/platform:/workspace
    ports:
      - "5555:5555"
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000}
    env_file: .env
    ports:
      - "3002:3000"
    depends_on:
      backend-core:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
