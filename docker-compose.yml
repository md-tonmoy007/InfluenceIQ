services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influenceiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influenceiq}
      POSTGRES_DB: ${POSTGRES_DB:-influenceiq}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influenceiq}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend-core:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: backend/.env
    ports:
      - "8002:8000"
    volumes:
      - .:/workspace
      - backend_venv:/workspace/backend/.venv
    environment:
      PYTHONPATH: /workspace
    healthcheck:
      # Hit the FastAPI / endpoint; the app is "up" when uvicorn
      # is serving. /health is a richer check but requires a
      # working DB + Redis, which the worker containers do not
      # need to verify themselves.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker_ai_agent:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.workers.ai_agent.worker:celery_app worker -Q ai_agent_queue -c 2 -n ai_agent@%h
    env_file: backend/.env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace
      - backend_venv:/workspace/backend/.venv
    healthcheck:
      # Celery's `inspect ping` round-trips through the broker.
      test: ["CMD", "celery", "-A", "backend.workers.ai_agent.worker:celery_app", "inspect", "ping", "-t", "2"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker_scraping:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.workers.scraping.worker:celery_app worker -Q scraping_queue -c 8 -n scraping@%h
    env_file: backend/.env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace
      - backend_venv:/workspace/backend/.venv
    healthcheck:
      test: ["CMD", "celery", "-A", "backend.workers.scraping.worker:celery_app", "inspect", "ping", "-t", "2"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker_scoring:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.workers.scoring.worker:celery_app worker -Q scoring_queue -c 4 -n scoring@%h
    env_file: backend/.env
    environment:
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace
      - backend_venv:/workspace/backend/.venv
    healthcheck:
      test: ["CMD", "celery", "-A", "backend.workers.scoring.worker:celery_app", "inspect", "ping", "-t", "2"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.workers.ai_agent.worker:celery_app flower --port=5555
    env_file: backend/.env
    environment:
      PYTHONPATH: /workspace
    ports:
      - "5555:5555"
    volumes:
      - .:/workspace
      - backend_venv:/workspace/backend/.venv
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8002}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8002}
    env_file: backend/.env
    ports:
      - "3002:3000"
    depends_on:
      backend-core:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_venv:
