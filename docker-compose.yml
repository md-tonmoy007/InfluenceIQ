services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influenceiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influenceiq}
      POSTGRES_DB: ${POSTGRES_DB:-influenceiq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influenceiq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend-core:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: uvicorn backend_core.app:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_search:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A app.celery_app:celery_app worker -E -Q search_queue -c 2 -n search@%h
    env_file: .env
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  worker_crawl:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A app.celery_app:celery_app worker -E -Q crawl_queue -c 8 -n crawl@%h
    env_file: .env
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  worker_extract:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A app.celery_app:celery_app worker -E -Q extract_queue -c 4 -n extract@%h
    env_file: .env
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  worker_score:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A app.celery_app:celery_app worker -E -Q score_queue -c 2 -n score@%h
    env_file: .env
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: platform/Dockerfile
    command: celery -A app.celery_app:celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend-core:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
