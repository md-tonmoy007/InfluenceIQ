line-length = 100
target-version = "py311"

# umgl_ai is the optional ML backend. Its files have legacy unused
# imports and unusual import ordering. The repo lints clean without
# it; the maintainers of umgl_ai can run `ruff check umgl_ai/`
# separately when they want to clean it up.
extend-exclude = [
    "umgl_ai",
    "scoring-and-extraction",
    "backend_core",
    "backend",
    "alembic",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter handles this)
    "B008",  # function call in default argument (FastAPI uses this pattern)
    "B904",  # raise from in except (we have many bare raises)
    "UP007", # X | Y union syntax (we use Optional for Python 3.10 compat)
]

[lint.per-file-ignores]
"tests/*" = ["B", "E402"]
"scripts/*" = ["B", "E402"]
"scoring_service/tests/*" = ["B", "E402"]
# The pre-existing scoring_service/analysis/* files have a style
# of multi-statement-if (`if cond: do_x(); do_y()`) that ruff E701
# flags. They are out of scope for this refactor; tracked for a
# follow-up cleanup PR.
"scoring_service/analysis/*.py" = ["E701", "E702"]
"scoring_service/detection/detection_classifier.py" = ["UP042"]
"scoring_service/scoring/normalize.py" = ["E701"]
"scoring_service/scoring/risk_components.py" = ["E701"]
"scoring_service/scoring/sub_scores.py" = ["E701"]
"scoring_service/extraction/contact_info.py" = ["E402"]
"scoring_service/pipeline/orchestrator.py" = ["F841"]

[format]
quote-style = "double"
indent-style = "space"
