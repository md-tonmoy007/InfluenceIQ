line-length = 100
target-version = "py311"

# backend.ml is the optional ML backend. Its files have legacy unused
# imports and unusual import ordering. The repo lints clean without
# it; the maintainers of backend.ml can run `ruff check backend/ml/`
# separately when they want to clean it up.
extend-exclude = [
    "backend/ml",
    ".venv",
    "frontend",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter handles this)
    "B008",  # function call in default argument (FastAPI uses this pattern)
    "B904",  # raise from in except (we have many bare raises)
    "UP007", # X | Y union syntax (we use Optional for Python 3.10 compat)
]

[lint.per-file-ignores]
"backend/tests/*" = ["B", "E402"]
"scripts/*" = ["B", "E402"]
"backend/tests/pipeline/*" = ["B", "E402"]
# The pre-existing backend/pipeline/analysis/* files have a style
# of multi-statement-if (`if cond: do_x(); do_y()`) that ruff E701
# flags. They are out of scope for this refactor; tracked for a
# follow-up cleanup PR.
"backend/pipeline/analysis/*.py" = ["E701", "E702"]
"backend/pipeline/detection/detection_classifier.py" = ["UP042"]
"backend/pipeline/fusion/normalize.py" = ["E701"]
"backend/pipeline/fusion/components.py" = ["E701"]
"backend/pipeline/fusion/sub_scores.py" = ["E701"]
"backend/pipeline/extraction/contact_info.py" = ["E402"]
"backend/pipeline/orchestrator/pipeline.py" = ["F841"]

[format]
quote-style = "double"
indent-style = "space"
