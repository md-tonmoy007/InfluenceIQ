line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter handles this)
    "B008",  # function call in default argument (FastAPI uses this pattern)
    "B904",  # raise from in except (we have many bare raises)
    "UP007", # X | Y union syntax (we use Optional for Python 3.10 compat)
]

[lint.per-file-ignores]
"tests/*" = ["B", "E402"]
"scripts/*" = ["B", "E402"]
"umgl_ai/*" = ["B", "E402"]
"scoring_service/tests/*" = ["B", "E402"]

[format]
quote-style = "double"
indent-style = "space"
