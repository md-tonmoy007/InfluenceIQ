# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathplots to prepend to sys.path before loading the env.py
# defaults to sys.path which is current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that are
# not in sys.path
# allow_empty_history = false

# version table name
# version_table = alembic_version

# version table schema
# version_table_schema =

# flag to use when setting up version table
# version_table_pk = true

# flag to use when setting up version table
# version_table_schema =

version_path_separator = os


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
